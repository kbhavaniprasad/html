<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" href="pexels-pixabay-38537.jpg" type="image/jpg">
</head>
<body>
    <p><b>Bhavani</b> Prasad</p><!-- the text is bold-->
    <p><i>Bhavani</i> Prasad</p><!-- the text is italic-->
    <p><u>Bhavani Prasad</u></p><!-- the text is underlined-->
    <p><del>Bhavani Prasad</del></p><!-- the text is deleted-->
    <p><big>Bhavani Prasad</big></p><!-- the text is big-->
    <p><small>Bhavani Prasad</small></p><!-- the text is small-->
    <p>Bhavani<sub>Prasad</sub></p><!-- the text is subscript-->
    <p>Bhavani<sup>Prasad</sup></p><!-- the text is superscript-->
    <p><tt>Bhavani Prasad</tt></p><!-- the text is teletype -->
    <p><mark>Bhavani Prasad</mark></p><!-- the text is marked -->


</body>
</html>
