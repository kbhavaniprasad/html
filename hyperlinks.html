
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlinks</title>
</head>
<body>
    <h1>Demo for Hyperlinks</h1>

    <a href="https://github.com" target="_blank">github</a><!--target is blank-->
    <br>
    <a href="https://linkedin.com" target="_self">Linkedin</a><!--target is self-->
    <br>
    <a href="https://youtube.com" target="_top">github</a><!--target is top-->
    <br>
    <a href="https://youtube.com" target="_parent">github</a><!--target is parent-->
    <br>
    <hr>


    <!--different elements in hyperlinks-->
    <a href="https://www.pexels.com/search/nature/" target="_self"><img src="pexels-pixabay-38537.jpg" alt="Nature iamge"></a>
    <br>
    <!--Mail to someone-->
    <a href="mailto:kolabhavaniprasad@gmail.com">Contact</a>
    <br>
    <!--to call a number-->
    <a href="tel:+91 8309304556">Call me</a>
    <br>
    <!--to download a file-->
    <a href="My Workflow.json" download>Download Workflow</a>

</body>
</html>
