<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" href="pexels-pixabay-38537.jpg" type="image/x-icon">
</head>
<body>
    <form action="submit.php" method="post" enctype="multipart/form-data">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="username" required>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" required maxlength="8" minlength="4">
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="username@gmail.com" required>
        <br>
        <label for="phn">Phone Number:</label>
        <input type="tel" id="phn" placeholder="1234567890" pattern="[0-9]{10}" maxlength="10">
        <br>
        <label for="bdate">Birth Date:</label>
        <input type="date" id="bdate" required>
        <br>
        <label for="qunatity">Quantity:</label>
        <input type="number" id="quantity" required min="1" max="99">
        <br>
        <label for="gender">Gender:</label>
        <br>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="other" required>
        <label for="other">Other</label>
        <br>
        <!---Drop Down Menu-->
        <label for="country">Country:</label>
        <select id="country" required>
            <option value="">Select Country</option>
            <option value="india">India</option>
            <option value="america">USA</option>
            <option value="canada">Canada</option>
            <option value="sri lanka">Sri Lanka</option>
        </select>
        <br>
        <!---Checkbox-->
        <input type="checkbox" id="terms" required>
        <label for="terms"><u>I agree to the terms and conditions</u>
            
        </label>
        
        <br>
        <label for="msg">Your Idea:</label>
        <input type="textarea" id="msg" required placeholder="write your own idea i will connect if i need this" maxlength="100" minlength="10" style="width:400px;height:20px;border-radius:10px"><br>
        
        <label for="resume">Upload Resume:</label><br>
        <input type="file" id="resume" required accept=".pdf,.doc.png">
        <br>
        <input type="submit"value="submit">

    </form>


    <!-- ...existing code... -->
        <script>
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault();  // Stop the form from submitting to submit.html
            document.body.innerHTML = '<h1>Data submitted successfully</h1>';  // Replace page with message
        });
        </script>

</body>
</html>
